  <script defer src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{width:100%;min-height:100vh;background:#F2EDE4;overflow-x:hidden}
    #root{width:100%}
    button{cursor:pointer;background:none;border:none;font:inherit}
    img{display:block}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(180,160,130,.4);border-radius:2px}

    /* ═══ 页面切换动效（保留自副本2） ═══ */
    @keyframes enterRight{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes enterLeft {from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes exitLeft  {from{opacity:1}to{transform:translateX(-40%);opacity:0}}
    @keyframes exitRight {from{opacity:1}to{transform:translateX(40%);opacity:0}}

    /* ═══ 首页装饰入场动画（保留自副本2） ═══ */
    @keyframes hp-fall {from{opacity:0;transform:translateY(-10px) scale(.92)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes hp-left {from{opacity:0;transform:translateX(12px)  scale(.90)}to{opacity:1;transform:translateX(0) scale(1)}}
    @keyframes hp-right{from{opacity:0;transform:translateX(-12px) scale(.90)}to{opacity:1;transform:translateX(0) scale(1)}}
    @keyframes hp-fade {from{opacity:0}to{opacity:1}}
    .hp-lanterns{animation:hp-fall  .75s cubic-bezier(.22,1,.36,1) .00s both}
    .hp-key     {animation:hp-left  .65s cubic-bezier(.22,1,.36,1) .28s both}
    .hp-leafseal{animation:hp-left  .65s cubic-bezier(.22,1,.36,1) .38s both}
    .hp-news    {animation:hp-left  .65s cubic-bezier(.22,1,.36,1) .50s both}
    .hp-flowers {animation:hp-left  .65s cubic-bezier(.22,1,.36,1) .60s both}
    .hp-redseal {animation:hp-right .65s cubic-bezier(.22,1,.36,1) .32s both}
    .hp-tickets {animation:hp-right .65s cubic-bezier(.22,1,.36,1) .42s both}
    .hp-papers  {animation:hp-right .65s cubic-bezier(.22,1,.36,1) .48s both}
    .hp-letter  {animation:hp-right .65s cubic-bezier(.22,1,.36,1) .56s both}
    .hp-quill   {animation:hp-right .65s cubic-bezier(.22,1,.36,1) .52s both}
    .hp-stamp   {animation:hp-right .65s cubic-bezier(.22,1,.36,1) .64s both}
    .hp-center  {animation:hp-fade  .60s ease-out               .50s both}

    /* ═══ 关于火漆动画（保留自副本2） ═══ */
    @keyframes dot-pop  {from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
    @keyframes line-grow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
    @keyframes txt-in   {from{opacity:0;transform:translateX(-22px)}to{opacity:1;transform:translateX(0)}}
    .ab-dot-1{animation:dot-pop  .38s cubic-bezier(.34,1.56,.64,1) .10s both}
    .ab-dot-2{animation:dot-pop  .38s cubic-bezier(.34,1.56,.64,1) .28s both}
    .ab-line  {animation:line-grow .55s cubic-bezier(.22,1,.36,1) .55s both;transform-origin:top center}
    .ab-txt-1 {animation:txt-in  .50s cubic-bezier(.22,1,.36,1) .95s both}
    .ab-txt-2 {animation:txt-in  .50s cubic-bezier(.22,1,.36,1) 1.25s both}

    /* ═══ 历史背景动画（保留自副本2） ═══ */
    @keyframes period-up{from{opacity:0;transform:translateY(48px)}to{opacity:1;transform:translateY(0)}}
    .period-0{animation:period-up .65s cubic-bezier(.22,1,.36,1) .20s both}
    .period-1{animation:period-up .65s cubic-bezier(.22,1,.36,1) .42s both}
    .period-2{animation:period-up .65s cubic-bezier(.22,1,.36,1) .64s both}

    /* ═══ 最终页动画（保留自副本2） ═══ */
    @keyframes congrats-in  {from{opacity:0;transform:translateY(55px)}to{opacity:1;transform:translateY(0)}}
    @keyframes seal-scale-in{from{opacity:0;transform:scale(1.4)}       to{opacity:1;transform:scale(1)}}
    @keyframes ring-rotate  {from{opacity:0;transform:rotate(-16deg)}    to{opacity:1;transform:rotate(0)}}
    .congrats-anim{animation:congrats-in   .65s cubic-bezier(.22,1,.36,1) .00s both}
    .seal-anim    {animation:seal-scale-in .62s cubic-bezier(.34,1.3,.64,1) .68s both}
    .ring-anim    {animation:ring-rotate   .65s cubic-bezier(.22,1,.36,1) 1.40s both}
    .btn-anim     {animation:hp-fade       .45s ease-out               1.90s both}
    .thank-anim   {animation:thank-reveal 2s cubic-bezier(.25,.46,.45,.94) .3s both}

    /* ═══ 信封定制动画 ═══ */
    @keyframes env-spread{from{opacity:0;transform:translateY(70px) scale(.65) rotate(0deg)}to{opacity:1;transform:translateY(0) scale(1) rotate(var(--sr))}}
    @keyframes env-retract{from{opacity:1;transform:translateY(0) scale(1) rotate(var(--sr))}to{opacity:0;transform:translateY(40px) scale(.7) rotate(0deg)}}
    @keyframes env-fade-in{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes env-fly-center{from{opacity:0;transform:scale(.55) translateY(-40px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes seal-to-flap{from{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(-25deg)}to{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)}}
    @keyframes bottom-up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes thank-reveal{from{opacity:0;clip-path:inset(0 100% 0 0)}to{opacity:1;clip-path:inset(0 0 0 0)}}

    /* ═══ 滚动触发动画的重置辅助 ═══ */
    .anim-off .hp-lanterns,
    .anim-off .hp-key,
    .anim-off .hp-leafseal,

    .anim-off .hp-flowers,

    .anim-off .period-0,

const ENVELOPE_COLORS=[
  {name:"酒红",hex:"#6B312E"},{name:"深蓝",hex:"#3A4F6B"},{name:"灰蓝",hex:"#8DA3C2"},
  {name:"浅金",hex:"#CAAD7B"},{name:"米白",hex:"#E0D9D2"},{name:"棕褐",hex:"#9A826A"},
  {name:"淡粉",hex:"#D4B8B0"},{name:"墨绿",hex:"#4A6741"},{name:"浅杏",hex:"#E8D5C0"},
  {name:"雾紫",hex:"#8B7D9B"},{name:"驼色",hex:"#C4A882"},{name:"灰绿",hex:"#7A8F7A"},
];

function makeWaxPath(cx,cy,r){
  const p=[];
  const s=r/300; // scale noise with radius so small seals keep the same silhouette
  for(let i=0;i<=140;i++){
    const a=(i/140)*Math.PI*2;
    const n=(Math.sin(a*7+.5)*5+Math.cos(a*11+1.1)*3.5+Math.sin(a*17+2.3)*2+Math.cos(a*23+.8)*1.5)*s;
    p.push(`${(cx+(r+n)*Math.cos(a)).toFixed(2)},${(cy+(r+n)*Math.sin(a)).toFixed(2)}`);
  }
  return "M "+p.join(" L ")+" Z";
}

function WaxSeal({waxColor,emblemIndex,metalIndex,size=300,uid="ws"}){
  const cx=size/2,cy=size/2,r=size*.42;
  const path=useMemo(()=>makeWaxPath(cx,cy,r),[size]);
  const m=METALS[metalIndex];
  const pale=["#F0EBE0","#EDE0C8","#E8D5A8"].includes(waxColor);
  const hl=pale?"rgba(255,255,255,.75)":"rgba(255,255,255,.28)";
  const sh=pale?"rgba(0,0,0,.09)":"rgba(0,0,0,.26)";
  const g=`mg${uid}`,cl=`sc${uid}`,s=`sh${uid}`,w=`wg${uid}`;
  return(
    <svg width={size}height={size}viewBox={`0 0 ${size} ${size}`}xmlns="http://www.w3.org/2000/svg"style={{overflow:"visible",display:"block"}}>
      <defs>
        <radialGradient id={w}cx="38%"cy="33%"r="68%">
          <stop offset="0%"stopColor={hl}/><stop offset="55%"stopColor="rgba(0,0,0,0)"/><stop offset="100%"stopColor={sh}/>
        </radialGradient>
        <linearGradient id={g}x1="0%"y1="0%"x2="100%"y2="100%">
          <stop offset="0%"stopColor={m.g[0]}/><stop offset="50%"stopColor={m.g[1]}/><stop offset="100%"stopColor={m.g[2]}/>
        </linearGradient>
        <clipPath id={cl}><circle cx={cx}cy={cy}r={r-1}/></clipPath>
        <filter id={s}x="-25%"y="-25%"width="150%"height="150%">
          <feDropShadow dx="0"dy="5"stdDeviation="12"floodColor="rgba(0,0,0,.3)"/>
        </filter>
      </defs>
      <path d={path}fill={waxColor}filter={`url(#${s})`}/>
      <path d={path}fill={`url(#${w})`}/>
      <g clipPath={`url(#${cl})`}>
        <g transform={`translate(${cx},${cy}) scale(${size/100}) translate(-50,-50)`}>
          {EMBLEMS[emblemIndex]&&EMBLEMS[emblemIndex].render(`url(#${g})`)}
        </g>
      </g>
      <circle cx={cx}cy={cy}r={r*.87}fill="none"stroke="rgba(15,6,2,.4)"strokeWidth={size*.027}style={{mixBlendMode:"multiply"}}/>
    </svg>
  );
}

function EnvelopeSVG({color,size=200,open=false,showPaper=false,style={}}){
  const w=size,h=size*.7,dark=color+"CC",light=color+"99";
  const innerW=w*.78,innerH=h*.55,ix=(w-innerW)/2,iy=h*.42;
  return(
    <svg width={w}height={h}viewBox={`0 0 ${w} ${h}`}xmlns="http://www.w3.org/2000/svg"style={{overflow:"visible",display:"block",...style}}>
      <defs>
        <filter id={`esh-${size}`}x="-10%"y="-10%"width="120%"height="130%">
          <feDropShadow dx="0"dy="3"stdDeviation="6"floodColor="rgba(0,0,0,.25)"/>
        </filter>
        <linearGradient id={`efg-${size}`}x1="0%"y1="0%"x2="100%"y2="100%">
          <stop offset="0%"stopColor="rgba(255,255,255,.22)"/><stop offset="50%"stopColor="rgba(255,255,255,.04)"/><stop offset="100%"stopColor="rgba(0,0,0,.08)"/>
        </linearGradient>
      </defs>
      <g filter={`url(#esh-${size})`}>
        {open?(
          <>
            <path d={`M ${w*.05},${h*.15} L ${w*.5},${h*.05} L ${w*.95},${h*.15}`}fill={light}stroke="rgba(0,0,0,.08)"strokeWidth=".8"/>
            <rect x={w*.05}y={h*.15}width={w*.9}height={h*.7}rx="2"fill={color}/>
            <rect x={w*.05}y={h*.15}width={w*.9}height={h*.7}rx="2"fill={`url(#efg-${size})`}/>
          </>
        ):(
          <>
            <rect x={w*.05}y={h*.1}width={w*.9}height={h*.7}rx="2"fill={color}/>
            <rect x={w*.05}y={h*.1}width={w*.9}height={h*.7}rx="2"fill={`url(#efg-${size})`}/>
            <path d={`M ${w*.05},${h*.1} L ${w*.5},${h*.48} L ${w*.95},${h*.1}`}fill={dark}stroke="rgba(0,0,0,.12)"strokeWidth=".8"strokeLinejoin="round"/>
            <line x1={w*.5}y1={h*.48}x2={w*.5}y2={h*.8}stroke="rgba(0,0,0,.13)"strokeWidth=".7"/>
          </>

/* ══════════ Hook：滚动进入视口时触发动画 ══════════ */
function useInView(options={}){
  const ref=useRef(null);
  const [inView,setInView]=useState(false);
  useEffect(()=>{
    const el=ref.current;
    if(!el)return;
    const obs=new IntersectionObserver(([entry])=>{
      if(entry.isIntersecting){setInView(true);obs.unobserve(el);}
    },{threshold:0.12,rootMargin:"-40px 0px -10% 0px",...options});
    obs.observe(el);
    return ()=>obs.disconnect();
  },[]);
  return [ref,inView];
}

    const s=new XMLSerializer().serializeToString(clone);
    const dataUrl="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(s);
    const sz=600,canvas=document.createElement("canvas");canvas.width=canvas.height=sz;
    const ctx=canvas.getContext("2d");if(!ctx)return;
    const img=new Image();
    img.onload=()=>{
      ctx.fillStyle=BG;ctx.fillRect(0,0,sz,sz);
      ctx.drawImage(img,0,0,sz,sz);
      const a=document.createElement("a");a.download="sealing-wax.png";a.href=canvas.toDataURL("image/png");
      document.body.appendChild(a);a.click();document.body.removeChild(a);
    };
    img.onerror=()=>{
      /* Fallback: 如果 SVG 包含的滤镜导致 canvas 渲染失败，直接下载 SVG 文件 */
      const a=document.createElement("a");a.download="sealing-wax.svg";
      const blob=new Blob([s],{type:"image/svg+xml;charset=utf-8"});
      a.href=URL.createObjectURL(blob);
      document.body.appendChild(a);a.click();document.body.removeChild(a);
    };
    img.src=dataUrl;
  };
  const R=185,CX=300,CY=300;
  return(
    <div style={{width:"100%",height:"100vh",background:BG,overflow:"hidden",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-start",position:"relative",paddingTop:"8vh"}}>

      <div style={{position:"absolute",top:"8px",left:"80px",zIndex:50}}>
        <button onClick={onBack}
          style={{padding:"11px 42px",background:"transparent",border:`1.5px solid ${INK}`,borderRadius:"60px",fontFamily:CN,fontSize:"16px",fontWeight:"600",color:INK,letterSpacing:"0.1em",transition:"all .22s"}}
          onMouseEnter={e=>{e.currentTarget.style.background=INK;e.currentTarget.style.color=BG}}
          onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=INK}}>
          返回
        </button>
      </div>
      <div style={{position:"relative",zIndex:10,width:600,height:520,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{position:"absolute",top:"52%",left:"50%",transform:"translate(-50%,-50%)",zIndex:1,pointerEvents:"none",userSelect:"none",whiteSpace:"nowrap",overflow:"visible"}}>
          <span className="congrats-anim"style={{display:"block",fontFamily:"'Arial Black','Arial Bold',Gadget,sans-serif",fontSize:"96px",fontWeight:"900",color:"#774a2d",letterSpacing:"0.01em"}}>
            CONGRATULATIONS
          </span>
        </div>
        <div className="ring-anim"style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width="600"height="600"viewBox="0 0 600 600">
            <defs>
              <path id="tArc2"d={`M ${CX-R},${CY} A ${R},${R} 0 0,1 ${CX+R},${CY}`}fill="none"/>
              <path id="bArc2"d={`M ${CX+R},${CY} A ${R},${R} 0 0,1 ${CX-R},${CY}`}fill="none"/>
            </defs>
            <text style={{fontFamily:CN,fontSize:"12.5px",fill:MUTED,letterSpacing:"0.08em"}}>
              <textPath href="#tArc2"startOffset="50%"textAnchor="middle">恭喜！已完成您的第一个专属火漆印章。我们为您铭记。</textPath>
            </text>
            <text style={{fontFamily:SERIF,fontSize:"11px",fill:"#9B8A78",letterSpacing:"0.07em"}}>
              <textPath href="#bArc2"startOffset="50%"textAnchor="middle">SEALING: to make your own sealing wax. We remember you.</textPath>
            </text>
          </svg>
        </div>
        <div ref={sealRef}className="seal-anim"style={{position:"relative",zIndex:11}}>
          <WaxSeal waxColor={WAX[waxIdx].hex}emblemIndex={emblIdx}metalIndex={metIdx}size={300}uid="result"/>

      </div>
      <div className="btn-anim"style={{position:"relative",zIndex:12,textAlign:"center",marginTop:"10px"}}>
        <p style={{fontFamily:CN,fontSize:"14px",color:FAINT,letterSpacing:"0.05em",marginBottom:"12px"}}>{WAX[waxIdx].name} · {EMBLEMS[emblIdx].name} · {METALS[metIdx].name}金属</p>
        <button onClick={handleSave}
          style={{padding:"13px 44px",background:"transparent",border:`1.5px solid ${INK}`,borderRadius:"60px",fontFamily:CN,fontSize:"16px",fontWeight:"600",color:INK,letterSpacing:"0.15em",display:"inline-flex",alignItems:"center",gap:"10px",transition:"all .25s"}}
          onMouseEnter={e=>{e.currentTarget.style.background=INK;e.currentTarget.style.color=BG}}
          onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=INK}}>
          <svg width="15"height="15"viewBox="0 0 24 24"fill="none"stroke="currentColor"strokeWidth="2.2"strokeLinecap="round"strokeLinejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12"y1="15"x2="12"y2="3"/>
          </svg>
          保存图片
        </button>
        <div style={{height:"16px"}}/>
        <button onClick={onContinue}
          style={{padding:"13px 44px",background:"transparent",border:`1.5px solid ${GOLD}`,borderRadius:"60px",fontFamily:CN,fontSize:"16px",fontWeight:"600",color:GOLD,letterSpacing:"0.12em",display:"inline-flex",alignItems:"center",gap:"8px",transition:"all .25s"}}
          onMouseEnter={e=>{e.currentTarget.style.background=GOLD;e.currentTarget.style.color=BG}}
          onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=GOLD}}>
          继续定制信封
        </button>
      </div>
    </div>
  );
}

/* ══════════ Section 5: 信封定制 ══════════ */
function EnvelopePage({waxIdx,emblIdx,metIdx,onBack}){
  const [leftOpen,setLeftOpen]=useState(false);
  const [rightOpen,setRightOpen]=useState(false);
  const [leftClosing,setLeftClosing]=useState(false);
  const [rightClosing,setRightClosing]=useState(false);
  const [selIdx,setSelIdx]=useState(null);
  const [letterText,setLetterText]=useState('');
  const [sealed,setSealed]=useState(false);
  const [animating,setAnimating]=useState(false);
  const sealRef=useRef(null);
  const sealedRef=useRef(null);
  const leftTimerRef=useRef(null);
  const rightTimerRef=useRef(null);

  /* 关闭动画结束后清除 closing 状态 */
  useEffect(()=>{
    if(leftClosing){leftTimerRef.current=setTimeout(()=>setLeftClosing(false),450);}
    return ()=>clearTimeout(leftTimerRef.current);
  },[leftClosing]);
  useEffect(()=>{
    if(rightClosing){rightTimerRef.current=setTimeout(()=>setRightClosing(false),450);}
    return ()=>clearTimeout(rightTimerRef.current);
  },[rightClosing]);

  const FOLDER_COUNT=4;
  const leftColors=ENVELOPE_COLORS.slice(0,FOLDER_COUNT);
  const rightColors=ENVELOPE_COLORS.slice(FOLDER_COUNT,FOLDER_COUNT*2);
  const selColor=selIdx!==null?ENVELOPE_COLORS[selIdx]:null;
  const infoStr=`${WAX[waxIdx].name} · ${EMBLEMS[emblIdx].name} · ${METALS[metIdx].name}金属`;

  const handleLeftClick=()=>{
    if(leftOpen){setLeftClosing(true);setLeftOpen(false);}
    else{clearTimeout(leftTimerRef.current);setLeftClosing(false);setLeftOpen(true);}
  };
  const handleRightClick=()=>{
    if(rightOpen){setRightClosing(true);setRightOpen(false);}
    else{clearTimeout(rightTimerRef.current);setRightClosing(false);setRightOpen(true);}
  };

  const handleSelectEnvelope=(idx)=>{
    setSelIdx(idx);
    setLetterText('');
    setSealed(false);
  };

  const goBack=()=>{setSelIdx(null);setLetterText('');setSealed(false)};
  const handleConfirm=()=>{setSealed(true)};
  const handleSaveSealed=()=>{
    const el=sealedRef.current;if(!el)return;
    const svg=el.querySelector('svg');
    if(!svg)return;
    const clone=svg.cloneNode(true);
    clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
    // Ensure foreignObject contents render in the cloned SVG for export
    const s=new XMLSerializer().serializeToString(clone);
    const sz=1200,canvas=document.createElement('canvas');canvas.width=canvas.height=sz;
    const ctx=canvas.getContext('2d');if(!ctx)return;
    const img=new Image();
    const blob=new Blob([s],{type:'image/svg+xml;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    img.onload=()=>{
      ctx.fillStyle=BG;ctx.fillRect(0,0,sz,sz);
      ctx.drawImage(img,0,0,sz,sz);
      URL.revokeObjectURL(url);
      const a=document.createElement('a');a.download='sealing-envelope.png';a.href=canvas.toDataURL('image/png');a.click();
    };
    img.onerror=()=>{
      // ForeignObject may fail to render in canvas — fallback: render canvas directly
      URL.revokeObjectURL(url);
      ctx.fillStyle=BG;ctx.fillRect(0,0,sz,sz);
      // Draw the SVG via inline <img>
      const fallbackImg=new Image();
      const b2=new Blob([s],{type:'image/svg+xml;charset=utf-8'});
      const u2=URL.createObjectURL(b2);
      fallbackImg.onload=()=>{
        ctx.drawImage(fallbackImg,0,0,sz,sz);
        URL.revokeObjectURL(u2);
        const a=document.createElement('a');a.download='sealing-envelope.png';a.href=canvas.toDataURL('image/png');a.click();
      };
      fallbackImg.src=u2;
    };
    img.src=url;
  };

  /* 信封展开到文件夹侧面 — 随机化位置、间距、旋转角度 */
  const spreadStyle=(i,side)=>{
    // side: 'left' or 'right'
    const seed=i*7.3+3.7;
    const x=110+i*115+Math.sin(seed)*18;
    const y=-15+Math.abs(i-1.5)*10+Math.cos(seed*1.7)*14;
    const rot=(Math.sin(seed)*9+Math.cos(seed*2.1)*5).toFixed(1);
    const base={
      position:'absolute',
      background:'transparent',border:'none',cursor:'pointer',padding:0,
      animation:`env-spread .45s cubic-bezier(.22,1,.36,1) ${i*.08}s both`,
      transition:'transform .25s',
      zIndex:20+i,
    };
    if(side==='left'){
      base.left=x+'px';
      base.top=`calc(50% + ${y}px)`;
      base.marginTop='-49px';
      base.transform=`rotate(${rot}deg)`;
      base['--sr']=rot+'deg';
    }else{
      base.right=x+'px';
      base.top=`calc(50% + ${y}px)`;
      base.marginTop='-49px';
      base.transform=`rotate(${-rot}deg)`;
      base['--sr']=(-rot)+'deg';
    }
    return base;
  };

  /* Phase: 写信视图 */
  if(selIdx!==null&&selColor&&!sealed){
    return(
      <div style={{width:'100%',minHeight:'100vh',background:BG,overflow:'hidden',display:'flex',flexDirection:'column',alignItems:'center',paddingTop:'100px',position:'relative'}}>
        {/* 返回按钮 — 与导航栏 SEALING 左对齐 */}
        <button onClick={onBack}
          style={{position:'absolute',top:'8px',left:'80px',zIndex:50,padding:"11px 42px",background:"transparent",border:`1.5px solid ${INK}`,borderRadius:"60px",fontFamily:CN,fontSize:"16px",fontWeight:"600",color:INK,letterSpacing:"0.1em",transition:"all .22s"}}
          onMouseEnter={e=>{e.currentTarget.style.background=INK;e.currentTarget.style.color=BG}}
          onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=INK}}>
          返回
        </button>
        <div style={{position:'relative',width:480,height:380,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{
            animation:'env-fly-center .6s cubic-bezier(.22,1,.36,1) .05s both',
            position:'relative',zIndex:1,
          }}>
            <svg width="420"height="300"viewBox="0 0 420 300"xmlns="http://www.w3.org/2000/svg"style={{overflow:'visible',display:'block'}}>
              <defs>
                <filter id="es2"x="-8%"y="-8%"width="116%"height="130%">
                  <feDropShadow dx="0"dy="6"stdDeviation="14"floodColor="rgba(0,0,0,.24)"/>
                </filter>
                <linearGradient id="eg2"x1="0%"y1="0%"x2="100%"y2="100%">
                  <stop offset="0%"stopColor="rgba(255,255,255,.18)"/><stop offset="50%"stopColor="rgba(255,255,255,.03)"/><stop offset="100%"stopColor="rgba(0,0,0,.06)"/>
                </linearGradient>
              </defs>
              <g filter="url(#es2)">
                <path d="M 21,45 L 210,-20 L 399,45" fill={selColor.hex+'CC'}stroke="rgba(0,0,0,.1)"strokeWidth="1"strokeLinejoin="round"/>
                <line x1="210"y1="-20"x2="210"y2="250"stroke="rgba(0,0,0,.06)"strokeWidth=".5"strokeDasharray="3,4"/>
                <rect x="21"y="45"width="378"height="235"rx="2.5"fill={selColor.hex}/>
                <rect x="21"y="45"width="378"height="235"rx="2.5"fill="url(#eg2)"/>
              </g>
              <rect x="42"y="52" width="336" height="218" rx="2" fill="#FAF9F6" stroke="rgba(0,0,0,.08)" strokeWidth=".7"/>
            </svg>
            <textarea value={letterText}onChange={e=>setLetterText(e.target.value)}placeholder="在此写下您的信件内容..."
              style={{
                position:'absolute',left:52,top:58,width:316,height:206,
                background:'transparent',border:'none',outline:'none',resize:'none',
                fontFamily:"'PingFang SC','Microsoft YaHei','KaiTi','STKaiti',serif",
                fontSize:'16px',color:INK,lineHeight:1.9,padding:'8px',
                borderRadius:'2px',overflow:'auto'
              }}/>
          </div>
        </div>
        <div style={{display:'flex',gap:'32px',marginTop:'28px',animation:'bottom-up .5s cubic-bezier(.22,1,.36,1) .4s both'}}>
          <button onClick={goBack}
            style={{width:52,height:52,borderRadius:'50%',border:'1.8px solid #B85C5C',background:'transparent',
              display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s'}}
            onMouseEnter={e=>{e.currentTarget.style.background='#B85C5C';const s=e.currentTarget.querySelector('svg line,svg path');if(s)s.style.stroke='#F2EDE4'}}
            onMouseLeave={e=>{e.currentTarget.style.background='transparent';const s=e.currentTarget.querySelector('svg line,svg path');if(s)s.style.stroke='#B85C5C'}}>
            <svg width="22"height="22"viewBox="0 0 24 24"fill="none"stroke="#B85C5C"strokeWidth="2.4"strokeLinecap="round">
              <line x1="6"y1="6"x2="18"y2="18"/><line x1="18"y1="6"x2="6"y2="18"/>
            </svg>
          </button>
          <button onClick={handleConfirm}
            style={{width:52,height:52,borderRadius:'50%',border:'1.8px solid #5C8A5C',background:'transparent',
              display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s'}}
            onMouseEnter={e=>{e.currentTarget.style.background='#5C8A5C';const s=e.currentTarget.querySelector('svg polyline');if(s)s.style.stroke='#F2EDE4'}}
            onMouseLeave={e=>{e.currentTarget.style.background='transparent';const s=e.currentTarget.querySelector('svg polyline');if(s)s.style.stroke='#5C8A5C'}}>
            <svg width="22"height="22"viewBox="0 0 24 24"fill="none"stroke="#5C8A5C"strokeWidth="2.4"strokeLinecap="round"strokeLinejoin="round">
              <polyline points="4,12 10,18 20,6"/>
            </svg>
          </button>
        </div>
        <p style={{fontFamily:CN,fontSize:'13px',color:FAINT,marginTop:'10px'}}>取消 · 确认</p>
      </div>
    );
  }

  /* 盖章保存视图 */
  if(selIdx!==null&&selColor&&sealed){
    return(
      <div style={{width:'100%',minHeight:'100vh',background:BG,overflow:'hidden',display:'flex',flexDirection:'column',alignItems:'center',paddingTop:'100px',position:'relative'}}>
        {/* 底图 thank.png — 置于所有图案下方，页面中间，从左到右渐显 */}
        <img src={I.thank}alt=""className="thank-anim"
          style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",zIndex:0,width:"1300px",pointerEvents:"none",userSelect:"none"}}/>
        {/* 返回按钮 — 与导航栏 SEALING 左对齐 */}
        <button onClick={onBack}
          style={{position:'absolute',top:'8px',left:'80px',zIndex:50,padding:"11px 42px",background:"transparent",border:`1.5px solid ${INK}`,borderRadius:"60px",fontFamily:CN,fontSize:"16px",fontWeight:"600",color:INK,letterSpacing:"0.1em",transition:"all .22s"}}
          onMouseEnter={e=>{e.currentTarget.style.background=INK;e.currentTarget.style.color=BG}}
          onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=INK}}>
          返回
        </button>
        <div style={{position:'relative',width:480,height:400,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div ref={sealedRef}style={{position:'relative',zIndex:1}}>
            <svg width="420"height="300"viewBox="0 0 420 300"xmlns="http://www.w3.org/2000/svg"style={{overflow:'visible',display:'block'}}>
              <defs>
                <filter id="es3"x="-8%"y="-8%"width="116%"height="130%">
                  <feDropShadow dx="0"dy="6"stdDeviation="14"floodColor="rgba(0,0,0,.24)"/>
                </filter>
                <linearGradient id="eg3"x1="0%"y1="0%"x2="100%"y2="100%">
                  <stop offset="0%"stopColor="rgba(255,255,255,.18)"/><stop offset="50%"stopColor="rgba(255,255,255,.03)"/><stop offset="100%"stopColor="rgba(0,0,0,.06)"/>
                </linearGradient>
              </defs>
              <g filter="url(#es3)">
                <rect x="21"y="35"width="378"height="245"rx="2.5"fill={selColor.hex}/>
                <rect x="21"y="35"width="378"height="245"rx="2.5"fill="url(#eg3)"/>
                <path d="M 21,35 L 210,140 L 399,35"fill={selColor.hex+'DD'}stroke="rgba(0,0,0,.1)"strokeWidth="1"strokeLinejoin="round"/>
                <line x1="210"y1="140"x2="210"y2="280"stroke="rgba(0,0,0,.08)"strokeWidth=".5"/>
              </g>
              <foreignObject x="215" y="140" width="110" height="110" style={{overflow:'visible'}}>
                <div style={{width:110,height:110,animation:'seal-to-flap .6s cubic-bezier(.34,1.3,.64,1) .3s both',transformOrigin:'center center'}}>
                  <WaxSeal waxColor={WAX[waxIdx].hex}emblemIndex={emblIdx}metalIndex={metIdx}size={100}uid="sealed"/>
                </div>
              </foreignObject>
            </svg>
          </div>
        </div>
        <p style={{fontFamily:CN,fontSize:'14px',color:FAINT,marginTop:'10px',animation:'bottom-up .5s cubic-bezier(.22,1,.36,1) .5s both'}}>{infoStr}</p>
        <div style={{animation:'bottom-up .5s cubic-bezier(.22,1,.36,1) .7s both',marginTop:'8px'}}>
          <button onClick={handleSaveSealed}
            style={{padding:"13px 44px",background:"transparent",border:`1.5px solid ${INK}`,borderRadius:"60px",fontFamily:CN,fontSize:"16px",fontWeight:"600",color:INK,letterSpacing:"0.15em",display:"inline-flex",alignItems:"center",gap:"10px",transition:"all .25s"}}
            onMouseEnter={e=>{e.currentTarget.style.background=INK;e.currentTarget.style.color=BG}}
            onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=INK}}>
            <svg width="15"height="15"viewBox="0 0 24 24"fill="none"stroke="currentColor"strokeWidth="2.2"strokeLinecap="round"strokeLinejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12"y1="15"x2="12"y2="3"/>
            </svg>
            保存图片
          </button>
        </div>
      </div>
    );
  }

  /* 主视图: 文件夹 + 信封展开 */
  return(
    <div style={{width:'100%',minHeight:'100vh',background:BG,overflow:'hidden',position:'relative'}}>
      {/* 火漆印 + 定制信息 — 左对齐导航栏 SEALING */}
      <div style={{display:'flex',alignItems:'center',gap:'22px',padding:'24px 80px 0'}}>
        <div ref={sealRef}style={{flexShrink:0}}>
          <WaxSeal waxColor={WAX[waxIdx].hex}emblemIndex={emblIdx}metalIndex={metIdx}size={80}uid="env0"/>
        </div>
        <div>
          <p style={{fontFamily:CN,fontSize:'16px',fontWeight:'600',color:INK,margin:0}}>您的专属火漆印章</p>
          <p style={{fontFamily:CN,fontSize:'13px',color:FAINT,marginTop:'4px'}}>{infoStr}</p>
        </div>
      </div>

      {/* 两个文件夹 — 交错布局 */}
      <div style={{position:'relative',height:'500px',marginTop:'24px',padding:'0 80px'}}>
        {/* 左侧文件夹 — 靠左上 */}
        <div style={{position:'absolute',left:'120px',top:'15px'}}>
          {/* 展开的信封 — 横向排列在文件夹右侧 */}
          {(leftOpen||leftClosing)&&(
            <div style={{position:'absolute',left:'300px',top:'0',width:'520px',height:'260px',zIndex:30}}>
              {leftColors.map((c,i)=>{
                const s=spreadStyle(i,'left');
                const retractStyle={...s,animation:`env-retract .38s cubic-bezier(.55,0,1,.45) ${(3-i)*.06}s both`};
                return (
                <button key={i}onClick={()=>handleSelectEnvelope(i)}
                  style={leftClosing?retractStyle:s}
                  onMouseEnter={leftClosing?undefined:e=>{const t=s.transform;e.currentTarget.style.transform=t+' scale(1.12) translateY(-10px)';e.currentTarget.style.filter='drop-shadow(0 8px 16px rgba(0,0,0,.22))';e.currentTarget.style.zIndex=100}}
                  onMouseLeave={leftClosing?undefined:e=>{e.currentTarget.style.transform=s.transform;e.currentTarget.style.filter='none';e.currentTarget.style.zIndex=20+i}}>
                  <EnvelopeSVG color={c.hex}size={140}/>
                </button>
                );
              })}
            </div>
          )}
          <button onClick={handleLeftClick}
            style={{width:380,height:290,background:'transparent',border:'none',cursor:'pointer',padding:0,transition:'transform .3s',position:'relative',zIndex:5}}
            onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.03)'}}
            onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)'}}>
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
              {leftColors.map((c,i)=>(
                <div key={i}style={{position:'absolute',bottom:18+Math.abs(i-1.5)*16,left:'50%',marginLeft:-62,zIndex:10+i,
                  transform:`translateX(${(i-1.5)*32}px) rotate(${(i-1.5)*4}deg)`,
                  transition:'transform .3s'}}>
                  <EnvelopeSVG color={c.hex}size={140}/>
                </div>
              ))}
              <img src="./file1.png"alt=""style={{width:'100%',height:'auto',position:'relative',zIndex:20,pointerEvents:'none'}}/>
            </div>
          </button>
        </div>

        {/* 提示文字 — 两个文件夹中间 */}
        <p style={{position:'absolute',left:'50%',top:'50%',transform:'translate(-50%,-50%)',
          fontFamily:CN,fontSize:'18px',fontWeight:'300',color:MUTED,textAlign:'center',letterSpacing:'0.06em',whiteSpace:'nowrap'}}>
          请点击文件夹，选择您心仪的信封。
        </p>

        {/* 右侧文件夹 — 靠右下 */}
        <div style={{position:'absolute',right:'105px',bottom:'-20px'}}>
          {(rightOpen||rightClosing)&&(
            <div style={{position:'absolute',right:'300px',top:'0',width:'520px',height:'260px',zIndex:30}}>
              {rightColors.map((c,i)=>{
                const s=spreadStyle(i,'right');
                const retractStyle={...s,animation:`env-retract .38s cubic-bezier(.55,0,1,.45) ${(3-i)*.06}s both`};
                return (
                <button key={i}onClick={()=>handleSelectEnvelope(FOLDER_COUNT+i)}
                  style={rightClosing?retractStyle:s}
                  onMouseEnter={rightClosing?undefined:e=>{const t=s.transform;e.currentTarget.style.transform=t+' scale(1.12) translateY(-10px)';e.currentTarget.style.filter='drop-shadow(0 8px 16px rgba(0,0,0,.22))';e.currentTarget.style.zIndex=100}}
                  onMouseLeave={rightClosing?undefined:e=>{e.currentTarget.style.transform=s.transform;e.currentTarget.style.filter='none';e.currentTarget.style.zIndex=20+i}}>
                  <EnvelopeSVG color={c.hex}size={140}/>
                </button>
                );
              })}
            </div>
          )}
          <button onClick={handleRightClick}
            style={{width:380,height:290,background:'transparent',border:'none',cursor:'pointer',padding:0,transition:'transform .3s',position:'relative',zIndex:5}}
            onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.03)'}}
            onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)'}}>
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
              {rightColors.map((c,i)=>(
                <div key={i}style={{position:'absolute',bottom:18+Math.abs(i-1.5)*16,left:'50%',marginLeft:-62,zIndex:10+i,
                  transform:`translateX(${(i-1.5)*32}px) rotate(${(i-1.5)*4}deg)`,
                  transition:'transform .3s'}}>
                  <EnvelopeSVG color={c.hex}size={140}/>
                </div>
              ))}
              <img src="./file2.png"alt=""style={{width:'100%',height:'auto',position:'relative',zIndex:20,pointerEvents:'none'}}/>
            </div>
          </button>
        </div>
      </div>
    </div>
  );
}

/* ══════════ App 主组件 ══════════ */
function App(){
  const [waxIdx,setWax]=useState(8);      /* 默认酒红 */
  const [emblIdx,setEmbl]=useState(0);    /* 默认百合花 */
  const [metIdx,setMet]=useState(0);      /* 默认金色 */
  const [activeSection,setActiveSection]=useState("home");
  const [showResult,setShowResult]=useState(false);
  const [showEnvelope,setShowEnvelope]=useState(false);
  const [scrollProgress,setScrollProgress]=useState(0);

  /* 滚动监听：用 scroll 事件准确判断当前所处的 section */
  useEffect(()=>{
    const ids=["home","about","history","diy"];
    const handleScroll=()=>{
      /* 滚动进度 */
      const scrollTop=window.scrollY;
      const docH=document.documentElement.scrollHeight;
      const winH=window.innerHeight;
      const maxScroll=docH-winH;
      setScrollProgress(maxScroll>0?Math.min(100,(scrollTop/maxScroll)*100):0);

      /* section 判断 */
      const viewTop=scrollTop;
      const viewBot=viewTop+winH;
      let current="home";
      for(const id of ids){
        const el=document.getElementById(`section-${id}`);
        if(!el)continue;
        if(viewTop>=el.offsetTop-160)current=id;
      }
      if(viewBot>=docH-60){
        for(let i=ids.length-1;i>=0;i--){
          const el=document.getElementById(`section-${ids[i]}`);
          if(el&&viewTop>=el.offsetTop-200){current=ids[i];break;}
        }
      }
      setActiveSection(current);
    };
    window.addEventListener("scroll",handleScroll,{passive:true});
    handleScroll(); /* 初始调用 */
    return ()=>window.removeEventListener("scroll",handleScroll);
  },[]);

  /* 平滑滚动到指定 section */
  const scrollToSection=useCallback((sectionId)=>{
    const el=document.getElementById(`section-${sectionId}`);
    if(el)el.scrollIntoView({behavior:"smooth"});
  },[]);

  /* 完成制作：先显示 result 区域，再滚动过去 */
  const handleDone=useCallback(()=>{
    setShowResult(true);
    /* 等 React 渲染出 result DOM 后再滚动 */
    setTimeout(()=>{
      const el=document.getElementById("section-result");
      if(el)el.scrollIntoView({behavior:"smooth"});
    },60);
  },[]);

  const handleBackToDIY=useCallback(()=>{
    setShowResult(false);
    setShowEnvelope(false);
    setTimeout(()=>{
      const el=document.getElementById("section-diy");
      if(el)el.scrollIntoView({behavior:"smooth"});
    },60);
  },[]);

  const handleBackToResult=useCallback(()=>{
    setShowEnvelope(false);
    setTimeout(()=>{
      const el=document.getElementById("section-result");
      if(el)el.scrollIntoView({behavior:"smooth"});
    },60);
  },[]);

  const handleContinueToEnvelope=useCallback(()=>{
    setShowEnvelope(true);
    setTimeout(()=>{
      const el=document.getElementById("section-envelope");
      if(el)el.scrollIntoView({behavior:"smooth"});
    },60);
  },[]);

  const diy={
    waxIdx,emblIdx,metIdx,setWax,setEmbl,setMet,
    onDone:handleDone,
  };

  return(
    <div style={{width:"100%",background:BG}}>
      {/* 粘性导航栏 */}
      <div style={{position:"sticky",top:0,zIndex:301,background:"#742C2B"}}>
        <NavBar activeSection={activeSection}scrollTo={scrollToSection}/>
      </div>

      {/* 勺子 + 进度条 — 悬浮在页面右上角，透明底，与“关于我们”右侧对齐 */}
      <div style={{position:"fixed",top:"54px",right:"80px",zIndex:400,display:"flex",flexDirection:"column",alignItems:"center",gap:"6px"}}>
        <img src={I.spoon}alt=""style={{width:"50px",height:"auto"}}/>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}}>
          <div style={{width:"50px",height:"3px",background:"#D3CBC0",borderRadius:"2px",overflow:"hidden"}}>
            <div style={{height:"100%",width:`${scrollProgress}%`,background:"#7BAFC2",borderRadius:"2px",transition:"width .15s linear"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",width:"100%"}}>
            <span style={{fontFamily:CN,fontSize:"9px",color:"#9B8A78",letterSpacing:"0.04em"}}>heating...</span>
            <span style={{fontFamily:SERIF,fontSize:"10px",color:"#5C4A36",fontWeight:"bold"}}>{Math.round(scrollProgress)}%</span>
          </div>
        </div>
      </div>

      {/* 所有页面纵向排列，可自由向下滚动 */}
      <div data-section="home"   id="section-home"   style={{scrollMarginTop:"60px"}}><HomePage scrollTo={scrollToSection}/></div>
      <div data-section="about"  id="section-about"  style={{scrollMarginTop:"60px"}}><AboutPage/></div>
      <div data-section="history"id="section-history"style={{scrollMarginTop:"60px"}}><HistoryPage/></div>
      <div data-section="diy"    id="section-diy"    style={{scrollMarginTop:"60px"}}><DIYPage {...diy}/></div>

      {/* 最终页：仅点击“完成制作”后才出现 */}
      {showResult && (
        <div id="section-result"style={{scrollMarginTop:"60px"}}>
          <ResultPage waxIdx={waxIdx}emblIdx={emblIdx}metIdx={metIdx}onContinue={handleContinueToEnvelope}onBack={handleBackToDIY}/>
        </div>
      )}
      {/* 信封定制页：仅点击"继续定制信封"后出现 */}
      {showEnvelope && (
        <div id="section-envelope"style={{scrollMarginTop:"60px"}}>
          <EnvelopePage waxIdx={waxIdx}emblIdx={emblIdx}metIdx={metIdx}onBack={handleBackToResult}/>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
